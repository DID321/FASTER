# Config yaml for EOC scene classification

# task name
task: SOC
# Dataset root path
data_path: J:/CSAR-ATR/Data
# save split file path
train_txt_path: J:/CSAR_ATR_Bench_20260223/Train_Test_TXT/EOC_angle_train.txt
test_txt_path: J:/CSAR_ATR_Bench_20260223/Train_Test_TXT/EOC_angle_test_240_300.txt

# sar train config
sar_train:
  angle: [ 0, 60 ]
  pitch: [ 10, 15, 20, 25, 30, 35, 40, 45, 50, 55, 60 ]
  band: ['KU']
  scene: ['Grass', 'Road']
  polar: ['HH', 'HV', 'VH', 'VV']

# sar test config
sar_test:
    angle: [ 240, 300 ]
    pitch: [ 10, 15, 20, 25, 30, 35, 40, 45, 50, 55, 60 ]
    band: ['KU']
    scene: ['Grass', 'Road']
    polar: ['HH', 'HV', 'VH', 'VV']

# Classes
names:
    0: Bulldozer
    1: Compact_Car
    2: Compact_SUV
    3: Large_Car
    4: Large_MPV
    5: Small_Bus
    6: Medium_Bus
    7: Off_Road_Vehicle
    8: Pika
    9: Semi_Trailer_Truck
    10: Small_SUV
    11: Sprinkler_Car